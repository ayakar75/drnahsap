services:
  postgres:
    image: postgres:16
    env_file:
      - drnahsap/docker.env
    ports:
      - "5432:5432"
    volumes:
      - "postgresql-data:/var/lib/postgresql/data"
    command: -p 5432

  app:
    container_name: app_drnahsap
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - drnahsap/docker.env
    volumes:
      - .:/srv/app
      - static-data:/srv/app/staticfiles # Django dosyaları buraya toplar
      - media-data:/srv/app/media
    ports:
      - "0.0.0.0:8000:8000"
    command: gunicorn drnahsap.wsgi:application --bind 0.0.0.0:8000

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static-data:/srv/app/staticfiles:ro # Nginx sadece okur
      - media-data:/srv/app/media:ro

volumes:
  postgresql-data:
  static-data:
  media-data: